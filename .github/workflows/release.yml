name: Release

# Per-component publishing, fully automated. A changeset landing on main triggers this:
#  - changesets PENDING  → changesets/action opens a "Version Packages" PR, then the next
#    step AUTO-MERGES it and publishes — all in this one run, no manual merge.
#  - changesets NONE     → it publishes any unpublished versions directly.
# Only the changed @labspangaea/ds-* packages move; the gallery is ignored (.changeset/config.json).
on:
  push:
    branches: [main]

# Never run two releases at once; let an in-flight publish finish (don't cancel it).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # commit the version bump / merge the Version Packages PR
  packages: write # publish to GitHub Packages
  pull-requests: write # open + merge the Version Packages PR

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # GitHub Packages auth for EVERY step (npm ci resolution + changeset publish).
      # The repo .npmrc reads ${NODE_AUTH_TOKEN}; the automatic GITHUB_TOKEN can
      # publish @labspangaea/* because each package.json has a matching `repository`.
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changesets needs full history to diff packages + write changelogs

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@labspangaea" # binds the CI .npmrc auth to our scope (the 403 fix)
          cache: npm

      - run: npm ci

      - run: npm run build:pkgs # fail fast if any package doesn't build

      # Pending changesets → opens the "Version Packages" PR (no publish). None → publishes.
      - name: Open "Version Packages" PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # needed to open/merge the PR

      # If a Version PR was just opened, auto-merge it and publish IN THIS SAME RUN. We can't
      # rely on the merge to re-trigger the publish, because pushes made by GITHUB_TOKEN don't
      # start new workflow runs — so we merge, pull the bumped main, and publish here.
      - name: Auto-merge the Version PR + publish
        if: steps.changesets.outputs.pullRequestNumber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.changesets.outputs.pullRequestNumber }}"
          echo "Auto-merging Version Packages PR #$PR"
          # GitHub computes mergeability asynchronously — wait for it, then squash-merge.
          for i in $(seq 1 10); do
            [ "$(gh pr view "$PR" --json mergeable --jq .mergeable)" = "MERGEABLE" ] && break
            sleep 3
          done
          gh pr merge "$PR" --squash --delete-branch
          # Pull the merged main (versions bumped, changesets consumed) and publish from it.
          git fetch origin main
          git checkout origin/main
          npm run release # build:pkgs && changeset publish → ships the new versions
